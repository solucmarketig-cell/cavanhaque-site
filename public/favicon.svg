<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4d03f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5a028;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" fill="#1a1a1a" rx="20"/>
  
  <!-- Letter C with gradient -->
  <text 
    x="50" 
    y="72" 
    font-family="Georgia, serif" 
    font-size="70" 
    font-weight="bold" 
    fill="url(#goldGradient)" 
    text-anchor="middle"
    style="font-style: italic;">C</text>
  
  <!-- Subtle border -->
  <rect width="100" height="100" fill="none" stroke="#d4af37" stroke-width="2" rx="20" opacity="0.3"/>
</svg>
