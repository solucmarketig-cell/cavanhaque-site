name: 🚀 Deploy Automático Cavanhaque

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Build & Sync para o Servidor
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Install Dependencies
      run: npm install

    - name: 🔨 Build Project
      run: npm run build

    - name: 📂 Sync files via SSH/SFTP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 22
        source: "dist/*"
        target: "/home/cavanhaque.com/public_html"
        strip_components: 1
